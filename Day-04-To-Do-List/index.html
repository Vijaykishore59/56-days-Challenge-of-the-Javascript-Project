<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To-Do-List</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="heading">
            <h1>TO-DO-LIST-APP</h1>
            <p class="subtitle">Stay Organised Every day</p>
        </div>
        <div class="input-field">
            <input type="text" id="taskInput" placeholder="Enter a Task">
            <button id="addBtn">Add Task</button>
        </div>
        <uL id="taskList">
        </uL>
        <div class="footer">
            <p class="total-tasks">Total tasks:<span id="totalTasks">0</span></p>
            <p class="complete">Completed:<span id="completed">0</span></p>
            <p class="pending-tasks">Pending:<span id="pending">0</span></p>
        </div>

    </div>
    <script src="script.js"></script>
</body>
</html>
