<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Number-Guessing-Game</title>
    <link rel="stylesheet" href="/Day-02-Number-Guessing-Game/style.css">
</head>
<body>
    <div class="container">
        <h1>🎯 Number Guessing Game</h1>
        <p class="side-heading">Guess a number between 1 and 100</p>
        <input id="guessInput" placeholder="Enter Your Guess">
        <button id="checkBtn">Check Guess</button>
        <p id="message">Start Guessing...</p>
        <p class="attempts">Attempts Left:<span id="attempts">10</span></p>
        <p class="previous-guesses">Previous Guesses:<span id="previousGuesses">None</span></p>
    </div>
    <script src="/Day-02-Number-Guessing-Game/script.js"></script>
</body>
</html>
