<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stopwatch</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">

        <h1 class="heading">⏱ Stopwatch</h1>

        <p id="timer">00:00:00</p>

        <div class="btn-section">
            <button class="hover-effect"id="start">Start</button>
            <button class="hover-effect" id="pause">Pause</button>
            <button class="hover-effect" id="reset">Reset</button>
            <button class="hover-effect" id="lap">Lap</button>
        </div>

        <div class="lap-section">
            <h2>Lap Times</h2>

            <ul id="lapList">
                <!-- JavaScript will add lap items here -->
            </ul>
        </div>

    </div>

    <script src="script.js"></script>

</body>
</html>
