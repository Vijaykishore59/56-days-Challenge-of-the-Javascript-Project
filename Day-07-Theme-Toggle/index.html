<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Theme Toggle</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">

        <div class="header">

            <h1>Theme Toggle</h1>

            <label class="switch">

                <input type="checkbox" id="themeToggle">

                <span class="slider"></span>

            </label>

        </div>

        <div class="content">

            <h2>Welcome 👋</h2>

            <p>
                This is a simple JavaScript project that demonstrates
                how to switch between Light Mode and Dark Mode.
            </p>

            <button class="btn">
                Learn More
            </button>

        </div>

    </div>

    <script src="script.js"></script>

</body>
</html>
